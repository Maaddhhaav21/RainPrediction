<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Extreme Rainfall Prediction</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 520px;
        padding: 40px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        color: white;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
      }

      label {
        font-weight: 600;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 11px;
        margin-top: 6px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-size: 14px;
      }

      input:focus {
        box-shadow: 0 0 5px #00e5ff;
      }

      button {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.03);
        background: linear-gradient(90deg, #0096ff, #0048ff);
      }

      .result {
        margin-top: 25px;
        padding: 18px;
        border-radius: 10px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }

      .rain {
        background: rgba(0, 150, 255, 0.25);
      }

      .norain {
        background: rgba(255, 180, 0, 0.25);
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🌧 Extreme Rainfall Prediction</h1>

      <form action="/" method="POST">
        <label>Location</label>
        <input
          type="text"
          name="location"
          placeholder="City name (e.g. Mumbai)"
          required
        />

        <label>Temperature (°F)</label>
        <input
          type="number"
          step="any"
          name="temperature"
          placeholder="Example: 72"
          required
        />

        <label>Humidity (%)</label>
        <input
          type="number"
          step="any"
          name="humidity"
          placeholder="0 - 100"
          required
        />

        <label>Wind Speed (km/h)</label>
        <input
          type="number"
          step="any"
          name="wind_speed"
          placeholder="Example: 15"
          required
        />

        <label>Precipitation (mm)</label>
        <input
          type="number"
          step="any"
          name="precipitation"
          placeholder="Example: 3"
          required
        />

        <label>Cloud Cover (%)</label>
        <input
          type="number"
          step="any"
          name="cloud_cover"
          placeholder="0 - 100"
          required
        />

        <label>Pressure (hPa)</label>
        <input
          type="number"
          step="any"
          name="pressure"
          placeholder="Example: 1005"
          required
        />

        <button type="submit">Predict Rainfall</button>
      </form>

      {% if results %}

      <div
        class="result {% if results == 1 or results == 'Rain Expected' %}rain{% else %}norain{% endif %}"
      >
        Prediction Result<br /><br />

        {{ results }}
      </div>

      {% endif %}

      <div class="footer">Machine Learning Weather Forecast System</div>
    </div>
  </body>
</html>
